services:
  - type: web
    name: nexus-studio
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    # Render free tier spins down after inactivity — normal behaviour
    envVars:
      - key: PHP_DISPLAY_ERRORS
        value: "0"
      - key: PHP_MAX_EXECUTION_TIME
        value: "60"
