<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeCrusher</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f8f9fa; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; font-family: monospace; }
        select, button { padding: 8px; margin-bottom: 15px; }
        .output-box { background: #eee; padding: 10px; border-radius: 5px; white-space: pre; }
    </style>
</head>
<body>
    <h1>Multi-Language Code Runner 🌍</h1>
    <form method="post">
        <label for="language">Select Language:</label>
        <select name="language" id="language">
            <option value="java" {% if language == 'java' %}selected{% endif %}>Java</option>
            <option value="python" {% if language == 'python' %}selected{% endif %}>Python</option>
            <option value="javascript" {% if language == 'javascript' %}selected{% endif %}>JavaScript</option>
            <option value="c" {% if language == 'c' %}selected{% endif %}>C</option>
        </select><br>

        <label for="code">Enter Code:</label>
        <textarea name="code" id="code">{{ code }}</textarea>

        <label for="program_input">Program Input (optional):</label>
        <textarea name="program_input" id="program_input" style="height:100px;">{{ program_input }}</textarea>

        <button type="submit">Run Code ▶️</button>
    </form>

    {% if result %}
        <h2>Result:</h2>
        <p>{{ result }}</p>
        <h2>Output:</h2>
        <div class="output-box">{{ output }}</div>
    {% endif %}
</body>
</html>
